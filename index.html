<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f5f7ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MI Dépenses">
<meta name="format-detection" content="telephone=no">
<title>MI Dépenses</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<!-- iPhone 15 / Dynamic Island splash -->
<meta name="apple-touch-fullscreen" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f7ff;
  --surface: #ffffff;
  --surface2: #eef1fb;
  --border: #e2e8f6;
  --shadow: 0 2px 12px rgba(99,118,175,.10);
  --accent: #7c6af5;
  --accent-pale: #ede9fe;
  --green: #10b981;
  --green-pale: #d1fae5;
  --red: #f43f5e;
  --red-pale: #ffe4e6;
  --orange: #fb923c;
  --orange-pale: #fff7ed;
  --text: #1a1d2e;
  --text2: #5c6282;
  --text3: #a0a8c0;
  --fd: 'Nunito', sans-serif;
  --fm: 'DM Mono', monospace;
  --nav: 72px;
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-l: env(safe-area-inset-left, 0px);
  --safe-r: env(safe-area-inset-right, 0px);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
  background: #f5f7ff;
}
body {
  font-family: var(--fd);
  background: var(--bg);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  /* Permet le scroll normal du body partout */
  min-height: 100dvh;
}
input,select,textarea,button { font-family: inherit; color: inherit; }
button { cursor: pointer; border: none; background: none; }

/* ── LAYOUT ── */
#app { max-width: 480px; margin: 0 auto; position: relative; }
#views-container { }
.view {
  display: none; flex-direction: column;
  min-height: 100dvh;
  padding-bottom: calc(var(--nav) + var(--safe-b) + 16px);
}
.view.active { display: flex; }
.view-header {
  /* padding-top tient compte de la Dynamic Island / notch */
  padding: calc(20px + var(--safe-t)) 20px 0;
  background: var(--bg);
  position: sticky; top: 0; z-index: 10;
}
.view-title { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 4px; color: var(--text); }
.view-sub { font-size: 13px; color: var(--text3); margin-bottom: 12px; }
.view-body {
  flex: 1;
  padding: 0 16px 16px;
}

/* ── MONTH TABS ── */
.month-tabs {
  flex-shrink: 0;
  display: flex; gap: 6px; overflow-x: auto;
  padding: 10px 20px; background: var(--bg);
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.month-tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0; padding: 6px 14px;
  border-radius: 20px; font-size: 13px; font-weight: 700;
  border: 2px solid var(--border);
  background: var(--surface); color: var(--text2);
  transition: all .18s;
  min-height: 36px;
}
.tab-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent);
}

/* ── CURRENCY TOGGLE ── */
.currency-toggle {
  display: flex; align-items: center;
  background: var(--surface2); border-radius: 20px;
  padding: 3px; gap: 2px; border: 1px solid var(--border);
}
.ct-opt {
  padding: 4px 10px; border-radius: 16px;
  font-size: 12px; font-weight: 700; cursor: pointer;
  color: var(--text3); transition: all .18s;
}
.ct-opt.active {
  background: var(--accent); color: #fff;
}

/* ── NAV BAR ── */
#nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  height: calc(var(--nav) + var(--safe-b));
  background: var(--surface);
  border-top: 1px solid var(--border);
  box-shadow: 0 -2px 16px rgba(99,118,175,.12);
  display: flex; align-items: flex-start; justify-content: space-around;
  /* safe-l/r pour iPhone en paysage */
  padding: 0 calc(8px + var(--safe-l)) var(--safe-b) calc(8px + var(--safe-r));
  z-index: 100;
  /* Fond qui s'étend sous l'indicateur home */
  padding-bottom: var(--safe-b);
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; padding: 10px 12px; min-width: 56px; min-height: 56px;
  border-radius: 12px; transition: all .15s;
  color: var(--text3); font-size: 10px; font-weight: 700;
}
.nav-btn .nav-icon { font-size: 20px; line-height: 1; }
.nav-btn.active { color: var(--accent); }
.nav-btn.active .nav-icon { transform: scale(1.12); }

/* ── FAB ── */
#fab {
  position: fixed; bottom: calc(var(--nav) + var(--safe-b) + 12px); right: calc(20px + var(--safe-r));
  width: 56px; height: 56px; border-radius: 18px;
  background: var(--accent); color: #fff;
  font-size: 28px; line-height: 1;
  box-shadow: 0 4px 20px rgba(124,106,245,.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 99; transition: transform .15s, box-shadow .15s;
  border: none; cursor: pointer;
}
#fab:active { transform: scale(.93); box-shadow: 0 2px 10px rgba(124,106,245,.35); }

/* ── CARDS ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; box-shadow: var(--shadow);
  padding: 16px; margin-bottom: 12px;
}
.card-title {
  font-size: 11px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .8px; color: var(--text3); margin-bottom: 12px;
}

/* ── STAT GRID ── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 14px 14px 12px;
  box-shadow: var(--shadow);
}
.stat-label { font-size: 11px; font-weight: 700; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .6px; }
.stat-value { font-size: 22px; font-weight: 900; color: var(--text); line-height: 1.1; }
.stat-value.mono { font-family: var(--fm); font-size: 19px; }
.stat-small { font-size: 11px; color: var(--text3); margin-top: 2px; font-weight: 600; }
.stat-card.green-bg { background: var(--green-pale); border-color: #a7f3d0; }
.stat-card.green-bg .stat-value { color: var(--green); }
.stat-card.red-bg { background: var(--red-pale); border-color: #fda4af; }
.stat-card.red-bg .stat-value { color: var(--red); }
.stat-card.accent-bg { background: var(--accent-pale); border-color: #c4b5fd; }
.stat-card.accent-bg .stat-value { color: var(--accent); }
.stat-card.orange-bg { background: var(--orange-pale); border-color: #fed7aa; }
.stat-card.orange-bg .stat-value { color: var(--orange); }

/* ── PROGRESS BAR ── */
.prog-wrap { margin-bottom: 10px; }
.prog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.prog-label { font-size: 13px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 6px; }
.prog-amount { font-size: 12px; font-weight: 700; font-family: var(--fm); color: var(--text2); }
.prog-bar-bg { height: 8px; border-radius: 8px; background: var(--surface2); overflow: hidden; }
.prog-bar { height: 100%; border-radius: 8px; transition: width .4s cubic-bezier(.4,0,.2,1); }
.prog-sub { font-size: 11px; color: var(--text3); margin-top: 3px; display: flex; justify-content: space-between; }

/* ── CAT BADGE ── */
.cat-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 700;
}

/* ── EXPENSE LIST ── */
.expense-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 13px 14px;
  margin-bottom: 8px; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  transition: box-shadow .15s; box-shadow: var(--shadow);
  min-height: 64px;
}
.expense-item:active { box-shadow: 0 1px 4px rgba(99,118,175,.08); transform: scale(.99); }
.expense-icon {
  width: 42px; height: 42px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.expense-info { flex: 1; min-width: 0; }
.expense-desc { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.expense-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
.expense-amount { text-align: right; flex-shrink: 0; }
.expense-eur { font-size: 16px; font-weight: 800; font-family: var(--fm); color: var(--text); }
.expense-tnd { font-size: 11px; color: var(--text3); font-family: var(--fm); }
.expense-badges { display: flex; gap: 4px; margin-top: 3px; justify-content: flex-end; }
.badge-small {
  font-size: 10px; padding: 1px 6px; border-radius: 10px;
  font-weight: 700; background: var(--surface2); color: var(--text3);
}
.badge-remb { background: var(--green-pale); color: var(--green); }
.badge-recu { background: var(--accent-pale); color: var(--accent); }

/* ── SEARCH + FILTERS ── */
.search-wrap { position: relative; margin-bottom: 10px; }
.search-input {
  width: 100%; padding: 11px 14px 11px 40px;
  border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--surface); font-size: 14px; color: var(--text);
  outline: none; transition: border-color .15s; min-height: 44px;
}
.search-input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }
.filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0; padding: 6px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 700; border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text2); min-height: 34px;
  white-space: nowrap; transition: all .15s;
}
.filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── DONUT SVG ── */
.donut-wrap { display: flex; align-items: center; gap: 16px; }
.donut-legend { flex: 1; display: flex; flex-direction: column; gap: 5px; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700; color: var(--text2); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ── MONTHLY BARS ── */
.monthly-bars { display: flex; gap: 10px; align-items: flex-end; height: 80px; }
.monthly-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.monthly-bar-bg { width: 100%; flex: 1; background: var(--surface2); border-radius: 8px; overflow: hidden; position: relative; display: flex; align-items: flex-end; max-height: 60px; }
.monthly-bar-fill { width: 100%; border-radius: 8px; transition: height .4s; }
.monthly-bar-label { font-size: 11px; font-weight: 800; color: var(--text3); }
.monthly-bar-val { font-size: 10px; font-weight: 700; color: var(--text2); font-family: var(--fm); }

/* ── CASH TRACK ── */
.cash-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.cash-row:last-child { border-bottom: none; }
.cash-row-label { font-size: 13px; color: var(--text2); font-weight: 600; }
.cash-row-val { font-size: 15px; font-weight: 800; font-family: var(--fm); color: var(--text); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(30,36,60,.35);
  z-index: 200; display: flex; flex-direction: column;
  justify-content: flex-end; align-items: center;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  width: 100%; max-width: 430px;
  background: var(--surface); border-radius: 24px 24px 0 0;
  padding: 0 0 calc(20px + var(--safe-b));
  transform: translateY(40px); transition: transform .25s cubic-bezier(.4,0,.2,1);
  max-height: 92dvh; overflow-y: auto;
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle {
  width: 40px; height: 4px; background: var(--border);
  border-radius: 4px; margin: 12px auto 4px;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 20px 16px;
}
.modal-title { font-size: 20px; font-weight: 900; color: var(--text); }
.modal-close {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--surface2); display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--text2);
}
.modal-body { padding: 0 20px; }

/* ── FORM ── */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 800; color: var(--text2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; display: block; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 12px 14px; border-radius: 12px;
  border: 1.5px solid var(--border); background: var(--bg);
  font-size: 15px; color: var(--text); outline: none;
  transition: border-color .15s; min-height: 48px;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); background: var(--surface); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
.toggle-label { font-size: 14px; font-weight: 700; color: var(--text); }
.toggle {
  width: 44px; height: 26px; border-radius: 13px; background: var(--border);
  position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0;
  border: none;
}
.toggle.on { background: var(--accent); }
.toggle::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 20px; height: 20px; border-radius: 50%; background: #fff;
  transition: transform .2s; box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.toggle.on::after { transform: translateX(18px); }

/* ── PHOTO PREVIEW ── */
.photo-preview {
  width: 100%; aspect-ratio: 4/3; border-radius: 12px;
  background: var(--surface2); border: 2px dashed var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; overflow: hidden; position: relative; min-height: 100px;
}
.photo-preview img { width: 100%; height: 100%; object-fit: cover; }
.photo-hint { font-size: 13px; color: var(--text3); font-weight: 700; margin-top: 6px; }
.photo-icon { font-size: 28px; }
.photo-rm {
  position: absolute; top: 8px; right: 8px;
  background: rgba(0,0,0,.5); color: #fff; border: none;
  border-radius: 8px; padding: 4px 8px; font-size: 12px; cursor: pointer;
}

/* ── BTN ── */
.btn {
  padding: 14px 20px; border-radius: 14px; font-size: 16px; font-weight: 800;
  min-height: 52px; display: inline-flex; align-items: center; justify-content: center;
  gap: 8px; transition: all .15s; border: none; cursor: pointer; width: 100%;
}
.btn-accent { background: var(--accent); color: #fff; box-shadow: 0 4px 14px rgba(124,106,245,.35); }
.btn-accent:active { transform: scale(.97); }
.btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text2); }
.btn-outline:active { background: var(--surface2); }
.btn-red { background: var(--red-pale); color: var(--red); border: 1.5px solid #fda4af; }
.btn-green { background: var(--green-pale); color: var(--green); border: 1.5px solid #6ee7b7; }
.btn-sm {
  padding: 9px 16px; border-radius: 10px; font-size: 13px; font-weight: 800;
  min-height: 38px; display: inline-flex; align-items: center; gap: 6px;
  border: none; cursor: pointer;
}
.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }

/* ── DETAIL MODAL ── */
.detail-hero {
  width: 64px; height: 64px; border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; margin-bottom: 12px;
}
.detail-amount { font-size: 32px; font-weight: 900; font-family: var(--fm); color: var(--text); }
.detail-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 14px 0; }
.detail-meta-item { background: var(--surface2); border-radius: 12px; padding: 10px 12px; }
.detail-meta-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: var(--text3); margin-bottom: 3px; }
.detail-meta-val { font-size: 14px; font-weight: 700; color: var(--text); }

/* ── REMB VIEW ── */
.remb-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.remb-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--border); }
.remb-row:last-child { border-bottom: none; }
.remb-row-left { display: flex; flex-direction: column; }
.remb-row-name { font-size: 14px; font-weight: 700; color: var(--text); }
.remb-row-sub { font-size: 12px; color: var(--text3); }
.remb-row-right { text-align: right; }
.remb-row-val { font-size: 15px; font-weight: 800; font-family: var(--fm); color: var(--text); }
.remb-row-quota { font-size: 11px; font-weight: 700; }

/* ── SETTINGS ── */
.settings-section { margin-bottom: 20px; }
.settings-section-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: .7px; color: var(--text3); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.budget-table { width: 100%; border-collapse: separate; border-spacing: 0 6px; }
.budget-table th { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; color: var(--text3); text-align: left; padding: 0 8px 4px; }
.budget-table th:not(:first-child) { text-align: right; }
.budget-table td { background: var(--surface); border: 1px solid var(--border); padding: 8px 10px; }
.budget-table td:first-child { border-radius: 10px 0 0 10px; font-size: 13px; font-weight: 700; color: var(--text); }
.budget-table td:last-child { border-radius: 0 10px 10px 0; }
.budget-input {
  width: 72px; text-align: right; padding: 5px 8px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 13px; font-weight: 700; font-family: var(--fm);
  background: var(--bg); color: var(--text); outline: none;
  min-height: 34px;
}
.budget-input:focus { border-color: var(--accent); }

/* ── ABOUT SYNC ── */
.sync-box {
  background: var(--accent-pale); border: 1.5px solid #c4b5fd;
  border-radius: 14px; padding: 16px; font-size: 13px; color: var(--text2);
  line-height: 1.6; font-weight: 600;
}
.sync-box strong { color: var(--accent); }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: calc(var(--nav) + var(--safe-b) + 70px);
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--text); color: #fff;
  padding: 10px 20px; border-radius: 12px; font-size: 14px; font-weight: 700;
  opacity: 0; transition: all .25s; z-index: 500; pointer-events: none;
  white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,.2);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 40px 20px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.empty-sub { font-size: 14px; color: var(--text3); font-weight: 600; }

/* ── SECTION HEADER ── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.section-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: .7px; color: var(--text3); }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 8px 0; }

/* ── GIST SYNC ── */
.gist-status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 700;
  margin-bottom: 12px;
}
.gist-status-badge.idle    { background: var(--surface2); color: var(--text3); }
.gist-status-badge.syncing { background: var(--accent-pale); color: var(--accent); }
.gist-status-badge.synced  { background: var(--green-pale); color: var(--green); }
.gist-status-badge.error   { background: var(--red-pale); color: var(--red); }
.gist-info-box {
  background: var(--surface2); border-radius: 10px;
  padding: 10px 12px; font-size: 12px; color: var(--text2);
  line-height: 1.6; margin-bottom: 12px;
}
.gist-info-box strong { color: var(--text); }
.gist-info-box a { color: var(--accent); }
.gist-id-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0; border-top: 1px solid var(--border); margin-top: 8px;
}
.gist-id-label { font-size: 11px; color: var(--text3); flex: 1; }
.gist-id-value { font-family: var(--fm); font-size: 11px; color: var(--text2); }
.pat-input-wrap { position: relative; }
.pat-input-wrap input { padding-right: 40px; }
.pat-toggle {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── CATEGORY ICON ── */
.cat-icon-wrap {
  width: 42px; height: 42px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.cat-icon-wrap.sm { width: 32px; height: 32px; border-radius: 8px; }
.cat-icon-wrap.lg { width: 56px; height: 56px; border-radius: 16px; }

/* ── NAV ICON ── */
.nav-svg { width: 22px; height: 22px; }

/* ── PAY TYPE ICON ── */
.pay-type-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--surface2); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: var(--text2);
}

/* ── PAY METHOD ROW ── */
.pay-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.pay-row:last-child { border-bottom: none; }
.pay-row-name { flex: 1; font-size: 14px; font-weight: 700; }
.pay-row-type { font-size: 11px; color: var(--text3); }

/* ── PAY EDIT ROW ── */
.pay-edit-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid var(--border);
}
.pay-edit-row:last-child { border-bottom: none; }
.pay-type-select {
  width: 38px; height: 38px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); text-align: center; font-size: 16px; cursor: pointer; flex-shrink: 0;
  -webkit-appearance: none; appearance: none;
}
.pay-name-input {
  flex: 1; padding: 8px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface2);
  font-size: 14px; font-weight: 600; outline: none;
}
.pay-name-input:focus { border-color: var(--accent); }
.btn-icon-del {
  width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--red-pale); color: var(--red); border: none; cursor: pointer;
}
/* ══════════════════════════════════════════════
   RESPONSIVE — Tablette / Desktop (≥ 700px)
══════════════════════════════════════════════ */
@media (min-width: 700px) {
  #app  { max-width: 680px; }
  #nav  { max-width: 680px; }
  #fab  { right: calc(50% - 340px + 20px); }

  /* Les 6 stat-cards s'étalent sur 3 colonnes × 2 lignes */
  .stat-group {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 12px;
  }
  .stat-group > .stat-grid {
    display: contents; /* les enfants participent directement à la grille parente */
  }

  .view-header { padding-left: 28px; padding-right: 28px; }
  .view-body   { padding-left: 28px; padding-right: 28px; }
  .month-tabs  { padding-left: 28px; padding-right: 28px; }

  .modal-sheet   { max-width: 560px; margin: auto; border-radius: 20px; }
  .modal-overlay { align-items: center; }
  .modal-handle  { display: none; }
}

/* ══════════════════════════════════════════════
   LOCK SCREEN
══════════════════════════════════════════════ */
#lock-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding-top: var(--safe-t);
  padding-bottom: var(--safe-b);
  gap: 0;
  transition: opacity .25s;
}
#lock-screen.hidden { opacity: 0; pointer-events: none; }

.lock-icon {
  width: 72px; height: 72px; border-radius: 22px;
  background: var(--accent-pale);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
}
.lock-title {
  font-size: 22px; font-weight: 900; color: var(--text);
  letter-spacing: -.4px; margin-bottom: 6px;
}
.lock-sub {
  font-size: 14px; color: var(--text3); font-weight: 600;
  margin-bottom: 32px; min-height: 20px; text-align: center;
  transition: color .2s;
}
.lock-sub.error { color: var(--red); }

.lock-dots {
  display: flex; gap: 16px; margin-bottom: 40px;
}
.lock-dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--border);
  transition: background .15s, transform .15s;
}
.lock-dot.filled { background: var(--accent); transform: scale(1.15); }
.lock-dot.error  { background: var(--red); }

@keyframes lockShake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-10px); }
  40%      { transform: translateX(10px); }
  60%      { transform: translateX(-8px); }
  80%      { transform: translateX(8px); }
}
.lock-dots.shake { animation: lockShake .4s ease; }

.lock-pad {
  display: grid; grid-template-columns: repeat(3, 72px);
  gap: 14px;
}
.lock-key {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform .1s, background .1s;
  user-select: none;
}
.lock-key:active { transform: scale(.92); background: var(--surface2); }
.lock-key-num { font-size: 24px; font-weight: 800; color: var(--text); line-height: 1; }
.lock-key-alpha { font-size: 8px; font-weight: 700; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; }
.lock-key.empty { background: none; border: none; box-shadow: none; cursor: default; }
.lock-key.del { background: var(--surface2); }
</style>
</head>

//  LOCK / PIN
// ══════════════════════════════════════════════
let _lockInput   = '';
let _lockMode    = 'check'; // 'check' | 'setup-first' | 'setup-confirm' | 'change-old' | 'change-new' | 'change-confirm'
let _lockFirst   = '';      // premier code saisi lors d'une création

async function hashPin(pin) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('mi2026:' + pin));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function lockKey(d) {
  if (_lockInput.length >= 4) return;
  _lockInput += d;
  updateLockDots();
  if (_lockInput.length === 4) setTimeout(lockSubmit, 120);
}

function lockDel() {
  _lockInput = _lockInput.slice(0, -1);
  updateLockDots();
}

function updateLockDots(state) {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('ld' + i);
    d.className = 'lock-dot' + (i < _lockInput.length ? ' filled' : '') + (state === 'error' ? ' error' : '');
  }
}

async function lockSubmit() {
  const pin = _lockInput;
  _lockInput = '';

  if (_lockMode === 'check') {
    const stored = localStorage.getItem('mi_pin');
    const h = await hashPin(pin);
    if (h === stored) {
      unlock();
    } else {
      lockError('Code incorrect');
    }

  } else if (_lockMode === 'setup-first') {
    _lockFirst = pin;
    _lockMode = 'setup-confirm';
    setLockSub('Confirmez le code');
    updateLockDots();

  } else if (_lockMode === 'setup-confirm') {
    if (pin === _lockFirst) {
      const h = await hashPin(pin);
      localStorage.setItem('mi_pin', h);
      toast('Code PIN activé ✓');
      unlock();
    } else {
      _lockFirst = '';
      _lockMode = 'setup-first';
      lockError('Codes différents — recommencez');
    }

  } else if (_lockMode === 'change-old') {
    const stored = localStorage.getItem('mi_pin');
    const h = await hashPin(pin);
    if (h === stored) {
      _lockMode = 'change-new';
      setLockSub('Nouveau code');
      updateLockDots();
    } else {
      lockError('Code incorrect');
    }

  } else if (_lockMode === 'change-new') {
    _lockFirst = pin;
    _lockMode = 'change-confirm';
    setLockSub('Confirmez le nouveau code');
    updateLockDots();

  } else if (_lockMode === 'change-confirm') {
    if (pin === _lockFirst) {
      const h = await hashPin(pin);
      localStorage.setItem('mi_pin', h);
      document.getElementById('lock-screen').classList.add('hidden');
      toast('Code PIN modifié ✓');
      renderSettings();
    } else {
      _lockFirst = '';
      _lockMode = 'change-new';
      lockError('Codes différents — recommencez');
    }
  }
}

function lockError(msg) {
  updateLockDots('error');
  setLockSub(msg, true);
  const dots = document.getElementById('lock-dots');
  dots.classList.add('shake');
  setTimeout(() => { dots.classList.remove('shake'); updateLockDots(); setLockSub(lockSubDefault()); }, 700);
}

function lockSubDefault() {
  if (_lockMode === 'setup-first')    return 'Choisissez un code à 4 chiffres';
  if (_lockMode === 'setup-confirm')  return 'Confirmez le code';
  if (_lockMode === 'change-old')     return 'Entrez l\'ancien code';
  if (_lockMode === 'change-new')     return 'Nouveau code à 4 chiffres';
  if (_lockMode === 'change-confirm') return 'Confirmez le nouveau code';
  return 'Entrez votre code';
}

function setLockSub(msg, isError) {
  const el = document.getElementById('lock-sub');
  el.textContent = msg;
  el.className = 'lock-sub' + (isError ? ' error' : '');
}

function unlock() {
  const ls = document.getElementById('lock-screen');
  ls.classList.add('hidden');
  setTimeout(() => ls.style.display = 'none', 260);
}

function initLock() {
  const hasPin = !!localStorage.getItem('mi_pin');
  const ls = document.getElementById('lock-screen');
  if (!hasPin) {
    ls.style.display = 'none'; // pas de PIN configuré → accès direct
    return;
  }
  _lockMode = 'check';
  setLockSub('Entrez votre code');
  updateLockDots();
}

// Appel depuis les Réglages
function setupPin() {
  _lockMode = 'setup-first';
  _lockFirst = '';
  _lockInput = '';
  const ls = document.getElementById('lock-screen');
  ls.style.display = '';
  ls.classList.remove('hidden');
  setLockSub('Choisissez un code à 4 chiffres');
  updateLockDots();
}

function changePin() {
  _lockMode = 'change-old';
  _lockFirst = '';
  _lockInput = '';
  const ls = document.getElementById('lock-screen');
  ls.style.display = '';
  ls.classList.remove('hidden');
  setLockSub('Entrez l\'ancien code');
  updateLockDots();
}

function disablePin() {
  if (!confirm('Désactiver le code PIN ?')) return;
  localStorage.removeItem('mi_pin');
  toast('Code PIN désactivé');
  renderSettings();
}

// ══════════════════════════════════════════════
//  GITHUB GIST SYNC
// ══════════════════════════════════════════════
let _gistTimer  = null;
let _syncState  = 'idle'; // idle | syncing | synced | error | disabled

function debouncedGistSync() {
  if (!settings.githubPAT) return;
  clearTimeout(_gistTimer);
  _gistTimer = setTimeout(syncToGist, 4000); // 4s après la dernière modif
  setSyncState('idle');
}

function setSyncState(s) {
  _syncState = s;
  const el = document.getElementById('gist-status');
  if (!el) return;
  const cfg = {
    idle:     { cls:'idle',    icon:'●', label:'En attente…'      },
    syncing:  { cls:'syncing', icon:'↻', label:'Sauvegarde…'      },
    synced:   { cls:'synced',  icon:'✓', label:'Sauvegardé sur Gist' },
    error:    { cls:'error',   icon:'✕', label:'Erreur de sync'   },
    disabled: { cls:'idle',    icon:'○', label:'Sync désactivée'  },
  };
  const c = cfg[s] || cfg.idle;
  el.className = `gist-status-badge ${c.cls}`;
  el.textContent = `${c.icon} ${c.label}`;
}

function gistHeaders() {
  return {
    'Authorization': `token ${settings.githubPAT}`,
    'Content-Type': 'application/json',
    'Accept': 'application/vnd.github.v3+json',
  };
}

function gistPayload() {
  const backup = {
    version: 3,
    savedAt: new Date().toISOString(),
    device: navigator.userAgent.slice(0, 60),
    settings: {
      rate:           settings.rate,
      budgets:        settings.budgets,
      paymentMethods: settings.paymentMethods,
      // githubPAT et githubGistId exclus volontairement (sensibles / propres à chaque appareil)
    },
    pin: localStorage.getItem('mi_pin') || null, // hash SHA-256, jamais le code en clair
    expenses,
  };
  return JSON.stringify({ files: { 'mi-depenses.json': { content: JSON.stringify(backup, null, 2) } } });
}

async function syncToGist() {
  if (!settings.githubPAT) {
    toast('Configure le token GitHub dans Réglages → Sauvegarde cloud');
    return;
  }
  setSyncState('syncing');
  try {
    let resp, gist;
    if (settings.githubGistId) {
      resp = await fetch(`https://api.github.com/gists/${settings.githubGistId}`, {
        method: 'PATCH', headers: gistHeaders(), body: gistPayload(),
      });
    } else {
      resp = await fetch('https://api.github.com/gists', {
        method: 'POST', headers: gistHeaders(),
        body: JSON.stringify({
          description: 'MI Dépenses — Sauvegarde automatique',
          public: false,
          files: { 'mi-depenses.json': { content: '{}' } },
        }),
      });
    }
    if (resp.status === 401) throw new Error('Token invalide ou expiré');
    if (resp.status === 404) {
      // Gist supprimé → en créer un nouveau
      settings.githubGistId = '';
      localStorage.setItem('mi_settings', JSON.stringify(settings));
      return syncToGist();
    }
    if (!resp.ok) throw new Error(`GitHub API : HTTP ${resp.status}`);
    gist = await resp.json();
    if (!settings.githubGistId) {
      settings.githubGistId = gist.id;
      localStorage.setItem('mi_settings', JSON.stringify(settings));
      if (curView === 'settings') renderSettings();
    }
    setSyncState('synced');
  } catch (e) {
    setSyncState('error');
    toast('Sync Gist : ' + e.message);
    console.error(e);
  }
}

async function loadFromGist() {
  if (!settings.githubPAT) { toast('Token GitHub manquant'); return; }
  if (!settings.githubGistId) { toast('Aucun Gist associé — sauvegarde d\'abord une fois'); return; }
  if (!confirm('Remplacer les données locales par celles du Gist ?')) return;
  setSyncState('syncing');
  try {
    const resp = await fetch(`https://api.github.com/gists/${settings.githubGistId}`, {
      headers: gistHeaders(),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const gist = await resp.json();
    const raw  = gist.files['mi-depenses.json']?.content;
    if (!raw) throw new Error('Fichier mi-depenses.json introuvable dans le Gist');
    const d = JSON.parse(raw);
    if (Array.isArray(d.expenses)) expenses = d.expenses;
    if (d.settings) {
      settings = {
        ...settings,
        ...d.settings,
        githubPAT:    settings.githubPAT,    // toujours propre à l'appareil
        githubGistId: settings.githubGistId, // toujours propre à l'appareil
      };
    }
    // Restaure le PIN hashé si présent dans le backup
    if (d.pin) {
      localStorage.setItem('mi_pin', d.pin);
    }
    localStorage.setItem('mi_expenses', JSON.stringify(expenses));
    localStorage.setItem('mi_settings', JSON.stringify(settings));
    setSyncState('synced');
    render();
    renderSettings();
    toast(`Chargé depuis Gist — ${expenses.length} dépenses (${d.savedAt?.slice(0,10)||'?'})`);
  } catch (e) {
    setSyncState('error');
    toast('Erreur chargement Gist : ' + e.message);
  }
}

function saveGistId() {
  const val = (document.getElementById('s-gist-id')?.value || '').trim();
  if (!val) { toast('ID vide — rien changé'); return; }
  settings.githubGistId = val;
  localStorage.setItem('mi_settings', JSON.stringify(settings));
  renderSettings();
  toast('Gist ID mis à jour — chargement…');
  loadFromGist();
}

async function disconnectGist() {
  if (!confirm('Déconnecter GitHub Gist ? Le Gist ne sera pas supprimé.')) return;
  settings.githubPAT = '';
  settings.githubGistId = '';
  localStorage.setItem('mi_settings', JSON.stringify(settings));
  setSyncState('disabled');
  renderSettings();
  toast('Gist déconnecté');
}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmtEur(n, dp=2) { return (n||0).toFixed(dp).replace('.',',') + ' €'; }
function fmtTnd(n, dp=2) { return (n||0).toFixed(dp).replace('.',',') + ' TND'; }
// Dashboard display currency (toggleable)
function dashFmt(eurVal, dp=2) {
  if(dashCurrency==='TND') return fmtTnd(eurVal * settings.rate, dp);
  return fmtEur(eurVal, dp);
}
function toggleDashCurrency() {
  dashCurrency = dashCurrency==='EUR' ? 'TND' : 'EUR';
  document.getElementById('dc-eur').classList.toggle('active', dashCurrency==='EUR');
  document.getElementById('dc-tnd').classList.toggle('active', dashCurrency==='TND');
  renderDash();
}
function pct(a,b) { return b>0 ? Math.min((a/b)*100,100) : 0; }

function toEur(amount, currency) {
  if(currency==='EUR') return amount;
  if(currency==='TND') return amount / settings.rate;
  if(currency==='USD') return amount * 0.92; // approximate
  return amount;
}
function toTnd(amount, currency) {
  if(currency==='TND') return amount;
  if(currency==='EUR') return amount * settings.rate;
  if(currency==='USD') return amount * 0.92 * settings.rate;
  return amount;
}
function expenseEur(e) { return toEur(e.amount, e.currency) + (e.bankFee||0); }
function expenseTnd(e) { return toTnd(e.amount, e.currency); }

function getMonth(e) {
  if(!e.date) return null;
  const ym = e.date.slice(0,7);
  // Les dépenses d'avril sont regroupées dans Mai (prépa)
  if(ym === '2026-04') return '2026-05';
  return ym;
}
function getMonthIdx(e) {
  const ym = getMonth(e);
  return MONTH_DATES.indexOf(ym);
}

function getBudget(catId) {
  if(settings.budgets[catId] && settings.budgets[catId].budget !== undefined)
    return settings.budgets[catId].budget;
  return CAT_MAP[catId]?.budget ?? 0;
}
function getPlafond(catId) {
  if(settings.budgets[catId] && settings.budgets[catId].plafond !== undefined)
    return settings.budgets[catId].plafond;
  return CAT_MAP[catId]?.plafond ?? null;
}

function catColor(catId) { return CAT_COLORS[catId] || CAT_COLORS.divers; }

function filteredExpenses() {
  return expenses.filter(e => {
    if(filterMo !== 'all') {
      const ym = getMonth(e);
      if(ym !== MONTH_DATES[MONTHS.indexOf(filterMo)]) return false;
    }
    if(catFilter !== 'all' && e.catId !== catFilter) return false;
    if(search) {
      const q = search.toLowerCase();
      if(!(e.desc||'').toLowerCase().includes(q) &&
         !(CAT_MAP[e.catId]?.lbl||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function makeDonut(segs, total, cx, cy, r, sw) {
  if(!total) return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#e2e8f6" stroke-width="${sw}"/>`;
  const circ = 2*Math.PI*r;
  let cumLen = 0;
  return segs.filter(s=>s.v>0).map(s=>{
    const len=(s.v/total)*circ;
    const offset = circ/4 - cumLen;
    cumLen += len;
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${sw}" stroke-dasharray="${len.toFixed(2)} ${(circ-len).toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/>`;
  }).join('');
}

function showView(v) {

function buildTabs(containerId, activeVal, onchange) {
  const el = document.getElementById(containerId);
  el.innerHTML = ['all',...MONTHS].map((m,i) =>
    `<button class="tab-btn ${filterMo===m&&activeVal===m?'active':m===activeVal?'active':''}" onclick="(${onchange})('${m}')">${i===0?'Tout':MONTH_LABELS[i-1]}</button>`

  el.querySelectorAll('.tab-btn').forEach((btn,i)=>{

    btn.classList.toggle('active', m===activeVal);

function renderList() {
  buildTabs('list-tabs', filterMo, `(m)=>{filterMo=m;renderList()}`);

  // Cat filters
  const row = document.getElementById('cat-filter-row');
  row.innerHTML = `<button class="filter-chip ${catFilter==='all'?'active':''}" onclick="setCatFilter('all')">Tout</button>` +
    CATS.map(c=>{const col=catColor(c.id);return `<button class="filter-chip ${catFilter===c.id?'active':''}" onclick="setCatFilter('${c.id}')" style="display:inline-flex;align-items:center;gap:5px">${icon(c.ic||'divers',13)} ${c.lbl}</button>`;}).join('');

  const exps = filteredExpenses().sort((a,b)=>b.date.localeCompare(a.date));
  const body = document.getElementById('list-body');

  if(!exps.length) {
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">🧾</div><div class="empty-title">Aucune dépense</div><div class="empty-sub">Appuie sur + pour ajouter</div></div>`;
    return;
  }

  // Group by date
  const byDate = {};
  exps.forEach(e => {
    const d = e.date || 'Inconnue';
    if(!byDate[d]) byDate[d] = [];
    byDate[d].push(e);
  });

  body.innerHTML = Object.entries(byDate).map(([date, es])=>`
    <div style="font-size:12px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 6px;padding-left:4px">${formatDate(date)}</div>
    ${es.map(e=>expenseCard(e)).join('')}
  `).join('');
}

function formatDate(d) {
  if(!d||d==='Inconnue') return 'Date inconnue';
  try {
    const dt = new Date(d+'T12:00:00');
    return dt.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'long'});
  } catch(e){ return d; }
}

function expenseCard(e) {
  const cat = CAT_MAP[e.catId] || CATS[CATS.length-1];
  const col = catColor(e.catId);
  const eur = expenseEur(e);
  const tnd = expenseTnd(e);
  const payIcon = payTypeIcon(e.payment);
  return `<div class="expense-item" onclick="openDetail('${e.id}')">
    ${catIconHtml(e.catId, 22)}
    <div class="expense-info">
      <div class="expense-desc">${e.enseigne ? `<span style="font-weight:800">${escHtml(e.enseigne)}</span>${e.desc?` · ${escHtml(e.desc)}`:''}` : escHtml(e.desc)||'Sans description'}</div>
      <div class="expense-meta" style="display:flex;align-items:center;gap:4px">${payIcon}<span>${cat.lbl} · ${escHtml(e.payment||'—')}</span></div>
    </div>
    <div class="expense-amount">
      <div class="expense-eur">${fmtEur(eur)}</div>
      <div class="expense-tnd">${fmtTnd(tnd,0)}</div>
      <div class="expense-badges">
        ${e.remb?'<span class="badge-small badge-remb">Remb.</span>':''}
        ${e.recu?'<span class="badge-small badge-recu">Reçu</span>':''}
      </div>
    </div>
  </div>`;
}

function payTypeIcon(paymentName) {
  const m = getPayMethods().find(x=>x.name===paymentName);
  const typeKey = m ? m.type : 'pay-other';
  const p = ICON_PATHS[typeKey] || ICON_PATHS['pay-other'];
  return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.5;flex-shrink:0">${p}</svg>`;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setCatFilter(id) { catFilter=id; renderList(); }
function onSearch(v) { search=v; renderList(); }

//  RENDER: REMBOURSEMENTS
// ══════════════════════════════════════════════
function renderRemb() {
  const rembExp = expenses.filter(e=>e.remb);
  const totalRemb     = rembExp.reduce((s,e)=>s+expenseEur(e),0);
  const avecRecu      = rembExp.filter(e=>e.recu).reduce((s,e)=>s+expenseEur(e),0);
  const sansRecu      = rembExp.filter(e=>!e.recu).reduce((s,e)=>s+expenseEur(e),0);
  const dejaRembourse = 0; // no tracking field, could add later
  const plafondTotal  = CATS.filter(c=>c.plafond).reduce((s,c)=>s+getPlafond(c.id),0);

  // Per-category
  const catRemb = CATS.filter(c=>getPlafond(c.id)!==null).map(c=>{

// ══════════════════════════════════════════════
async function savePAT() {
  const pat = (document.getElementById('s-pat')?.value || '').trim();
  if (!pat) { toast('Token vide'); return; }
  if (!pat.startsWith('ghp_') && !pat.startsWith('github_pat_')) {
    if (!confirm('Ce token ne ressemble pas à un token GitHub classique (ghp_…). Continuer quand même ?')) return;
  }
  settings.githubPAT = pat;
  settings.githubGistId = settings.githubGistId || '';
  localStorage.setItem('mi_settings', JSON.stringify(settings));
  renderSettings();

  if (settings.githubGistId) {
    // Gist ID déjà connu → synchro directe
    toast('Token sauvegardé — synchronisation…');
    syncToGist();
  } else {
    // Pas de Gist ID → chercher un Gist existant chez cet utilisateur
    toast('Recherche d\'un Gist existant…');
    setSyncState('syncing');
    try {
      const resp = await fetch('https://api.github.com/gists?per_page=100', {
        headers: gistHeaders(),
      });
      if (resp.status === 401) { setSyncState('error'); toast('Token invalide'); return; }
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const gists = await resp.json();
      const found = gists.find(g => g.files && g.files['mi-depenses.json']);
      if (found) {
        settings.githubGistId = found.id;
        localStorage.setItem('mi_settings', JSON.stringify(settings));
        renderSettings();
        setSyncState('idle');
        toast('Gist trouvé ! Chargement des données…');
        loadFromGist();
      } else {
        setSyncState('idle');
        toast('Aucun Gist existant — la première sauvegarde en créera un.');
      }
    } catch(e) {
      setSyncState('error');
      toast('Erreur recherche Gist : ' + e.message);
    }
  }
}

function saveRate() {
  const v = parseFloat(document.getElementById('s-rate').value);
  if(isNaN(v)||v<=0) return toast('Taux invalide');
  settings.rate = v;
  save();
  toast('Taux sauvegardé : 1€ = '+v+' TND');
}

function saveBudgets() {
  CATS.forEach(c=>{
    const bEl = document.getElementById('b-budget-'+c.id);
    const pEl = document.getElementById('b-plafond-'+c.id);
    if(!settings.budgets[c.id]) settings.budgets[c.id] = {};
    if(bEl) settings.budgets[c.id].budget = bEl.value!=='' ? parseFloat(bEl.value)||0 : undefined;
    if(pEl) settings.budgets[c.id].plafond = pEl.value!=='' ? parseFloat(pEl.value)||null : null;
  });
  save();
  toast('Budgets sauvegardés !');
}

function resetBudgets() {
  if(!confirm('Réinitialiser tous les budgets aux valeurs par défaut ?')) return;
  settings.budgets = {};
  save();
  renderSettings();
  toast('Budgets réinitialisés');
}

function exportData() {
  const blob = new Blob([JSON.stringify({expenses, settings}, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `mi-depenses-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}

async function shareData() {
  const json = JSON.stringify({expenses, settings}, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const file = new File([blob], `mi-depenses-${new Date().toISOString().slice(0,10)}.json`, {type:'application/json'});
  if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
    try { await navigator.share({files:[file], title:'MI Dépenses', text:'Export de mes dépenses'}); return; } catch(e){}
  }
  // fallback: copy JSON to clipboard
  try {
    await navigator.clipboard.writeText(json);
    toast('JSON copié dans le presse-papier !');
  } catch(e) {
    toast('Partage non disponible sur ce navigateur');
  }
}

function importData(ev) {
  const f = ev.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(data.expenses) expenses = data.expenses;
      if(data.settings) settings = Object.assign({rate:3.38,budgets:{}}, data.settings);
      save(); render();
      toast('Import réussi : '+expenses.length+' dépenses');
    } catch(err) { toast('Fichier invalide'); }
  };
  reader.readAsText(f);
  ev.target.value = '';
}

function confirmReset() {
  if(!confirm('Supprimer TOUTES les dépenses ? Cette action est irréversible.')) return;
  expenses = [];
  save(); render();
  toast('Toutes les dépenses supprimées');
}

    </div>
  `).join('');
}

function addPayMethod() {
  if (!settings.paymentMethods || !settings.paymentMethods.length) {
    settings.paymentMethods = [...DEFAULT_PAYMENTS];
  }
  settings.paymentMethods.push({id:uid(), name:'Nouveau', type:'pay-card'});
  save(); renderPayMethodsList();
}

function deletePayMethod(i) {
  if (!settings.paymentMethods) settings.paymentMethods = [...DEFAULT_PAYMENTS];
  if (settings.paymentMethods.length <= 1) { toast('Gardez au moins un moyen de paiement'); return; }
  settings.paymentMethods.splice(i, 1);
  save(); renderPayMethodsList();
}

function savePayMethods() {
  const methods = getPayMethods();
  const updated = methods.map((m,i) => ({
    ...m,
    name: (document.getElementById('pm-name-'+i)?.value || m.name).trim() || m.name,
    type: document.getElementById('pm-type-'+i)?.value || m.type,
  })).filter(m=>m.name);
  settings.paymentMethods = updated;
  save(); renderPayMethodsList();
  toast('Moyens de paiement sauvegardés !');
}

function autoFillRecuName() {
  // Only auto-fill if user hasn't manually edited the field
  const recuEl = document.getElementById('f-recu-name');
  if(recuEl.dataset.userEdited === '1') return;
  const enseigne = (document.getElementById('f-enseigne')?.value||'').trim();
  const catId = document.getElementById('f-cat')?.value || '';
  const date = document.getElementById('f-date')?.value || '';
  const catLabel = CAT_MAP[catId]?.lbl || catId;
  const parts = [enseigne, catLabel, date].filter(Boolean);
  recuEl.value = parts.join('_').toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_\-]/g,'');
}

function openAddModal() {
  editingId = null;
  photoData = null;
  document.getElementById('modal-add-title').textContent = 'Nouvelle dépense';
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-cat').value = 'alim';
  document.getElementById('f-enseigne').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-currency').value = 'TND';
  document.getElementById('f-bank').value = '0';
  populatePaymentSelect();
  // default = premier moyen de paiement
  const methods = getPayMethods();
  if (methods.length) document.getElementById('f-payment').value = methods[0].name;
  const recuEl = document.getElementById('f-recu-name');
  recuEl.dataset.userEdited = '0';
  recuEl.value = '';
  setToggle('t-remb', false);
  setToggle('t-recu', false);
  updatePhotoPreview();
  openModal('modal-add');
  autoFillRecuName();
}

function openEdit(id) {
  const e = expenses.find(x=>x.id===id); if(!e) return;
  editingId = id;
  photoData = e.photo || null;
  closeModal('modal-detail');
  document.getElementById('modal-add-title').textContent = 'Modifier la dépense';
  document.getElementById('f-date').value  = e.date;
  document.getElementById('f-cat').value   = e.catId;
  document.getElementById('f-enseigne').value = e.enseigne||'';
  document.getElementById('f-desc').value  = e.desc||'';
  document.getElementById('f-amount').value = e.amount;
  document.getElementById('f-currency').value = e.currency||'TND';
  document.getElementById('f-bank').value  = e.bankFee||0;
  populatePaymentSelect();
  document.getElementById('f-payment').value = e.payment || getPayMethods()[0]?.name || '';
  const recuEl = document.getElementById('f-recu-name');
  recuEl.value = e.recuName||'';
  recuEl.dataset.userEdited = '1'; // preserve existing name in edit mode
  setToggle('t-remb', !!e.remb);
  setToggle('t-recu', !!e.recu);
  updatePhotoPreview();
  openModal('modal-add');
}

function submitAdd() {
  const date     = document.getElementById('f-date').value;
  const catId    = document.getElementById('f-cat').value;
  const enseigne = document.getElementById('f-enseigne').value.trim();
  const desc     = document.getElementById('f-desc').value.trim();
  const amount   = parseFloat(document.getElementById('f-amount').value);
  const currency = document.getElementById('f-currency').value;
  const bankFee  = parseFloat(document.getElementById('f-bank').value)||0;
  const payment  = document.getElementById('f-payment').value;
  const remb     = document.getElementById('t-remb').classList.contains('on');
  const recu     = document.getElementById('t-recu').classList.contains('on');
  const recuName = document.getElementById('f-recu-name').value.trim();

  if(!date) return toast('Choisir une date');
  if(isNaN(amount)||amount<0) return toast('Montant invalide');

  if(editingId) {
    const idx = expenses.findIndex(x=>x.id===editingId);
    if(idx>=0) {
      // createdAt preserved — never overwritten on edit
      expenses[idx] = {...expenses[idx], date, catId, enseigne, desc, amount, currency, bankFee, payment, remb, recu, recuName, photo: photoData};
    }
    toast('Dépense modifiée !');
  } else {
    const ym = date.slice(0,7);
    const moIdx = MONTH_DATES.indexOf(ym);
    expenses.push({ id:uid(), date, catId, enseigne, desc, amount, currency, bankFee, payment, remb, recu, recuName, photo: photoData, month: moIdx>=0?MONTHS[moIdx]:null, createdAt: new Date().toISOString() });
    toast('Dépense ajoutée !');
  }
  save();
  closeModal('modal-add');
  editingId = null;
  photoData = null;
  render();
}

// ══════════════════════════════════════════════
//  MODAL: DETAIL
// ══════════════════════════════════════════════
function openDetail(id) {
  detailId = id;
  const e = expenses.find(x=>x.id===id); if(!e) return;
  const cat = CAT_MAP[e.catId]||CAT_MAP.divers;
  const col = catColor(e.catId);
  const eur = expenseEur(e);
  const tnd = expenseTnd(e);

  document.getElementById('detail-body').innerHTML = `
    <div style="text-align:center;padding:0 0 16px">
      <div class="detail-hero" style="background:${col.bg};color:${col.text};margin:0 auto 8px">
        ${icon(cat.ic||'divers', 32, col.text)}
      </div>
      <div class="detail-amount">${fmtEur(eur)}</div>
      <div style="font-size:13px;color:var(--text3);margin-top:4px">${fmtTnd(tnd)} · ${formatDate(e.date)}</div>
      ${e.enseigne ? `<div style="font-size:15px;font-weight:800;color:var(--text);margin-top:6px">${escHtml(e.enseigne)}</div>` : ''}
      <div style="margin-top:8px">
        <span style="background:${col.bg};color:${col.text};padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:6px">${icon(cat.ic||'divers',14,col.text)} ${cat.lbl}</span>
      </div>
    </div>

    <div class="detail-meta-grid">
      <div class="detail-meta-item">
        <div class="detail-meta-label">Montant saisi</div>
        <div class="detail-meta-val">${e.amount} ${e.currency}</div>
      </div>
      <div class="detail-meta-item">
        <div class="detail-meta-label">Frais banque</div>
        <div class="detail-meta-val">${fmtEur(e.bankFee||0)}</div>
      </div>
      <div class="detail-meta-item">
        <div class="detail-meta-label">Paiement</div>
        <div class="detail-meta-val">${e.payment||'—'}</div>
      </div>
      <div class="detail-meta-item">
        <div class="detail-meta-label">Remboursable</div>
        <div class="detail-meta-val" style="display:flex;align-items:center;gap:4px">${e.remb?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg><span style="color:var(--green)">Oui</span>`:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg><span style="color:var(--text3)">Non</span>`}</div>
      </div>
      <div class="detail-meta-item">
        <div class="detail-meta-label">Reçu joint</div>
        <div class="detail-meta-val" style="display:flex;align-items:center;gap:4px">${e.recu?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg><span style="color:var(--green)">Oui</span>`:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg><span style="color:var(--text3)">Non</span>`}</div>
      </div>
      <div class="detail-meta-item">
        <div class="detail-meta-label">Nom du reçu</div>
        <div class="detail-meta-val" style="font-size:12px">${e.recuName||'—'}</div>
      </div>
      <div class="detail-meta-item" style="grid-column:1/-1">
        <div class="detail-meta-label">Ajouté le</div>
        <div class="detail-meta-val" style="font-size:12px;color:var(--text3)">${e.createdAt ? new Date(e.createdAt).toLocaleString('fr-FR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—'}</div>
      </div>
    </div>

    ${e.desc ? `<div style="background:var(--surface2);border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:14px;color:var(--text);font-weight:600">${escHtml(e.desc)}</div>` : ''}

    ${e.photo ? `
      <div style="margin-bottom:14px;border-radius:12px;overflow:hidden;max-height:200px">
        <img src="${e.photo}" style="width:100%;object-fit:cover;display:block" alt="Justificatif">
      </div>

    <div class="btn-row" style="margin-bottom:10px">
      <button class="btn btn-accent btn-sm" style="flex:1;min-height:44px;display:flex;align-items:center;justify-content:center;gap:6px" onclick="openEdit('${e.id}')">${icon('edit',16,'#fff')} Modifier</button>
      <button class="btn btn-outline btn-sm" style="flex:1;min-height:44px;display:flex;align-items:center;justify-content:center;gap:6px" onclick="addPhotoAfter('${e.id}')">${icon('camera',16)} ${e.photo?'Changer le reçu':'Ajouter un reçu'}</button>

    <button class="btn btn-red" style="min-height:44px;display:flex;align-items:center;justify-content:center;gap:6px;width:100%" onclick="deleteExpense('${e.id}')">${icon('trash',16,'var(--red)')} Supprimer</button>

function deleteExpense(id) {
  if(!confirm('Supprimer cette dépense ?')) return;
  expenses = expenses.filter(e=>e.id!==id);
  save(); closeModal('modal-detail'); render();
  toast('Dépense supprimée');
}

// ══════════════════════════════════════════════
//  PHOTO
// ══════════════════════════════════════════════
function triggerPhoto(inputId) {
  document.getElementById(inputId).click();
}

function handlePhoto(event, inputId) {
  const file = event.target.files[0]; if(!file) return;
  resizeImage(file, 900, 0.78, dataUrl => {
    photoData = dataUrl;
    updatePhotoPreview();
  });
}

function updatePhotoPreview() {
  const prev = document.getElementById('photo-preview');
  if(!prev) return;
  if(photoData) {
    prev.innerHTML = `<img src="${photoData}" alt="Aperçu"><button class="photo-rm" onclick="event.stopPropagation();photoData=null;updatePhotoPreview()">✕</button>`;
  } else {
    prev.innerHTML = `<span class="photo-icon">📷</span><span class="photo-hint">Appuyer pour ajouter</span>`;
  }
}

function addPhotoAfter(id) {
  detailId = id;
  document.getElementById('photo-input-after').click();
}

function handlePhotoAfter(event) {
  const file = event.target.files[0]; if(!file) return;
  resizeImage(file, 900, 0.78, dataUrl => {
    const idx = expenses.findIndex(e=>e.id===detailId);
    if(idx>=0) {
      expenses[idx].photo = dataUrl;
      expenses[idx].recu = true;
      save();
      openDetail(detailId);
      toast('Justificatif ajouté !');
    }
  });
  event.target.value = '';
}

function resizeImage(file, maxSize, quality, callback) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if(w>maxSize||h>maxSize) {
        if(w>h) { h=Math.round(h*(maxSize/w)); w=maxSize; }
        else { w=Math.round(w*(maxSize/h)); h=maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      callback(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════════════════
//  TOGGLE
// ══════════════════════════════════════════════
function toggleBtn(id) {
  document.getElementById(id).classList.toggle('on');
}
function setToggle(id, val) {
  const el = document.getElementById(id);
  if(val) el.classList.add('on'); else el.classList.remove('on');
}

// ══════════════════════════════════════════════
//  MODAL HELPERS
// ══════════════════════════════════════════════
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e, modalId) {
  if(e.target.id===modalId) closeModal(modalId);
}

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
let _toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>el.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════════
//  RENDER DISPATCH
// ══════════════════════════════════════════════
function render() {
  if(curView==='dashboard') renderDash();
  else if(curView==='list') renderList();
  else if(curView==='remb') renderRemb();
  else if(curView==='settings') renderSettings();
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
function init() {
  load();
  populateCatSelect();
  render();
  initLock();
  // Service Worker
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
